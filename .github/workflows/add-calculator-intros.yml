name: Add calculator intro sections

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-intros:
    if: ${{ !contains(github.event.head_commit.message, '[skip intro add]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Insert short intro sections
        run: |
          python3 <<'PY'
          from pathlib import Path

          intros = {
