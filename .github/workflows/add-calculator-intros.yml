            "first-100k-service-business-calculator/index.html": "Use this first $100K service business calculator to estimate jobs needed, leads needed, weeks to goal, close rate, average job value, and rough profit.",
            "lawn-mowing-pricing-calculator/index.html": "Use this lawn care profit calculator to estimate mowing price, travel, fuel, labor value, equipment wear, markup, profit, and profit per hour before quoting a yard.",
            "plumbing-business-startup-cost-calculator/index.html": "Use this plumbing business startup cost calculator to estimate tools, vehicle setup, training, licensing path costs, insurance, launch marketing, working capital, and jobs needed to recover startup cost.",
            "hvac-business-startup-cost-calculator/index.html": "Use this HVAC business startup cost calculator to estimate certification path costs, tools, vehicle setup, insurance, marketing, working capital, and startup recovery math.",
            "electrical-contractor-startup-cost-calculator/index.html": "Use this electrical contractor startup cost calculator to estimate licensing path costs, tools, meters, vehicle setup, permits, insurance, and launch cash needs.",
            "pest-control-business-startup-calculator/index.html": "Use this pest control startup calculator to estimate licensing, equipment, chemicals, vehicle setup, insurance, launch marketing, working capital, and startup payback.",
            "towing-business-startup-calculator/index.html": "Use this towing business startup calculator to estimate tow truck cost, permits, insurance, gear, dispatch setup, working capital, and startup recovery math.",
            "golf-hole-in-one-challenge-profit-calculator/index.html": "Use this golf hole-in-one challenge profit calculator to estimate entry revenue, sponsor revenue, prize cost, event expenses, and profit for a paid golf challenge.",
            "mobile-sauna-business-calculator/index.html": "Use this mobile sauna business calculator to estimate rental revenue, delivery cost, fuel or wood, maintenance, insurance, monthly profit, and payback.",
            "photo-booth-rental-profit-calculator/index.html": "Use this photo booth rental profit calculator to estimate booking revenue, props, labor, software, delivery, maintenance, monthly profit, and equipment payback.",
            "christmas-light-installation-profit-calculator/index.html": "Use this Christmas light installation profit calculator to estimate seasonal revenue, materials, labor, removals, storage, marketing, and seasonal profit.",
            "mobile-knife-sharpening-profit-calculator/index.html": "Use this mobile knife sharpening profit calculator to estimate tickets, customers, consumables, fuel, route cost, equipment payback, and monthly profit.",
