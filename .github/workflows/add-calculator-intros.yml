            "pressure-washing-business-profit-calculator/index.html": "Use this pressure washing profit calculator to estimate job price, chemical cost, fuel, labor hours, equipment wear, profit, revenue per hour, and profit per hour.",
            "stump-grinding-profit-calculator/index.html": "Use this stump grinding profit calculator to estimate job profit, wear allowance, cleanup cost, equipment payment impact, monthly profit, and profit per hour.",
