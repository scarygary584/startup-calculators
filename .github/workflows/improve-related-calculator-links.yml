            html = path.read_text(encoding="utf-8")
            link_html = ''.join(f'<a href="{href}">{label}</a>' for href, label in links)
            replacement = f'<section class="section"><h2>Related calculators</h2><div class="related-links">{link_html}</div></section>'
            if section_re.search(html):
              new_html, count = section_re.subn(replacement, html, count=1)
            else:
              anchor = '<section class="section"><div class="disclaimer">'
              if anchor not in html:
                continue
              new_html = html.replace(anchor, replacement + anchor, 1)
              count = 1
            if count and new_html != html:
              path.write_text(new_html, encoding="utf-8")
              changed.append(rel)

